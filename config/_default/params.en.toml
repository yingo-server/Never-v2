# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon        = "img/favicon.jpg"

# Accepted values: "default", "lastmod"
SortBy              = "default"

[footer]
    customText = "Custom footer content"

[dateFormat]
    published   = ":date_medium"
    lastUpdated = ":date_medium"

[sidebar]
    emoji    = ""
    subtitle = "These are wonderful days, and also days of suffering.<br>These are an era of great talent, and also an era of ignorance."
    avatar   = "img/avatar.jpg"

[article]
    headingAnchor = true
    math          = false
    readingTime   = true

    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"
